<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CÃO CHUPANDO MANGÁ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- FAVICON com link online -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/FKQJ771J/favicon-cao.png">

    <style>
        /* ===== Mesmas variáveis e reset do sistema ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-color: #0d0d10;
            --text-main: #ffffff;
            --text-sub: #7e7e8c;
            --primary-color: #ff4757;
            --wood-top: #8a5229;
            --wood-front: #5c341a;
        }

        body {
            background: linear-gradient(135deg, #0d0d10 0%, #1a1a20 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }

        /* Cartão de boas-vindas */
        .welcome-card {
            background: #141417;
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid #2a2a30;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .logo {
            max-width: 80%;
            height: auto;
            margin-bottom: 1.5rem;
        }

        p {
            color: var(--text-sub);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .btn-enter {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            margin-top: 0.5rem;
            box-shadow: 0 4px 12px rgba(255,71,87,0.3);
        }

        .btn-enter:hover {
            background: #e63d4e;
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 6px 16px rgba(255,71,87,0.4);
        }

        .btn-enter:active {
            transform: scale(0.98);
        }

        /* ===== RESPONSIVIDADE ===== */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .welcome-card {
                padding: 2rem;
                max-width: 90%;
            }
            .logo {
                max-width: 85%;
                margin-bottom: 1.2rem;
            }
            p {
                font-size: 0.95rem;
                margin-bottom: 1.2rem;
            }
            .btn-enter {
                padding: 0.7rem 1.8rem;
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 0.8rem;
            }
            .welcome-card {
                padding: 1.5rem;
                border-radius: 16px;
            }
            .logo {
                max-width: 95%;
                margin-bottom: 1rem;
            }
            p {
                font-size: 0.85rem;
                line-height: 1.5;
                margin-bottom: 1rem;
            }
            .btn-enter {
                padding: 0.6rem 1.5rem;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 360px) {
            .welcome-card {
                padding: 1.2rem;
            }
            p {
                font-size: 0.8rem;
            }
            .btn-enter {
                padding: 0.5rem 1.2rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

<div class="welcome-card">
    <img src="https://i.postimg.cc/sXjQ4qYC/logo-cao-chupando-manga.png" alt="Cão Chupando Mangá" class="logo">
    <p>Bem-vindo ao seu gerenciador pessoal de mangás. Organize seus mangás favoritos, dê notas e controle seu progresso em um só lugar.</p>
    <p>Pronto pra resenhar?</p>
    <a th:href="@{/mangas}" class="btn-enter">Entrar no Catálogo</a>
</div>

</body>
</html>
