<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CÃO CHUPANDO MANGÁ</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/FKQJ771J/favicon-cao.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        /* ===== Reset e variáveis ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0d0d10;
            --text-main: #ffffff;
            --text-sub: #b0b0c0; /* mais claro que antes */
            --primary-color: #ff4757;
            --wood-top: #8a5229;
            --wood-front: #5c341a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d0d10 0%, #1a1a20 100%);
            padding: 2rem;
            min-height: 100vh;
        }

        .container-principal {
            max-width: 1400px;
            margin: 0 auto;
            background: #141417;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid #2a2a30;
        }

        .topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-img {
            height: 50px;
            width: auto;
            display: block;
        }

        .btn-add {
            background: var(--primary-color);
            border: none;
            padding: 0.6rem 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            transition: 0.3s;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-add:hover {
            background: #e63e4e;
            transform: scale(1.02);
            color: white;
        }

        /* ESTANTE */
        .shelf-container {
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        .shelf-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 2rem;
            padding: 0 0.5rem;
            position: relative;
        }

        .manga-card {
            width: 100%;
            max-width: 200px;
            justify-self: center;
            position: relative;
            transition: transform 0.3s ease;
            cursor: pointer;
            transform-origin: bottom center;
            transform: perspective(500px) rotateX(4deg);
        }
        .manga-card:hover {
            transform: perspective(500px) rotateX(0deg) scale(1.06) translateY(-12px);
            z-index: 5;
        }

        .manga-cover {
            width: 100%;
            height: 280px;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.75), 0 3px 6px rgba(0,0,0,0.4);
            background: #1e1e24;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .manga-cover i {
            font-size: 4rem;
            color: var(--text-sub);
        }
        .manga-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Informações - TÍTULO MAIS CLARO */
        .manga-info {
            margin-top: 0.8rem;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .manga-info h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #ffffff; /* branco puro */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin: 0;
            letter-spacing: 0.5px;
        }
        .manga-info .author {
            font-size: 0.8rem;
            color: #c0c0d0; /* mais claro */
            margin-top: 0.2rem;
        }
        .nota {
            font-size: 0.8rem;
            color: #ffaa66;
            margin-top: 0.2rem;
        }
        .card-actions {
            text-align: center;
            margin-top: 0.5rem;
        }
        .btn-remove, .btn-edit {
            background: none;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
            margin: 0 4px;
        }
        .btn-edit {
            color: #ffaa66;
        }
        .btn-edit:hover {
            color: #ffcc88;
        }
        .btn-remove {
            color: #cc8866;
        }
        .btn-remove:hover {
            color: #ff6644;
        }

        /* BADGE DE STATUS COM CORES DINÂMICAS */
        .badge-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 0.3rem;
            text-transform: uppercase;
        }
        /* Cores por status */
        .badge-status.QUERO_LER {
            background: #3498db;
            color: white;
        }
        .badge-status.LENDO {
            background: #f39c12;
            color: #1e1e1e;
        }
        .badge-status.LIDO {
            background: #2ed573;
            color: #1e1e1e;
        }
        .badge-status.ABANDONADO {
            background: #ff4757;
            color: white;
        }

        /* Prateleira de madeira */
        .wood-plank {
            grid-column: 1 / -1;
            height: 24px;
            background: linear-gradient(to bottom, var(--wood-front), #361d0e);
            border-radius: 2px;
            margin-top: -50px;
            z-index: -1;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.8);
            position: relative;
        }
        .wood-plank::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 0;
            width: 100%;
            height: 12px;
            background: linear-gradient(to right, #9a5e35, var(--wood-top), #9a5e35);
            transform: perspective(500px) rotateX(45deg);
            transform-origin: bottom;
            box-shadow: inset 0 -2px 5px rgba(0,0,0,0.4);
        }

        .empty-message {
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 3rem;
            border-radius: 20px;
            margin-top: 2rem;
            color: var(--text-sub);
            grid-column: 1 / -1;
        }

        /* Responsividade */
        @media (max-width: 1200px) {
            .shelf-grid { grid-template-columns: repeat(4, 1fr); }
            .wood-plank { margin-top: -48px; }
        }
        @media (max-width: 850px) {
            .shelf-grid { grid-template-columns: repeat(3, 1fr); }
            .wood-plank { margin-top: -45px; }
        }
        @media (max-width: 550px) {
            .shelf-grid { grid-template-columns: repeat(2, 1fr); }
            .wood-plank { margin-top: -40px; }
        }
        @media (max-width: 480px) {
            .manga-cover { height: 200px; }
            .logo-img { height: 35px; }
        }

        /* MODAL escuro */
        .modal-content {
            background: #141417;
            border: 1px solid #2a2a30;
            border-radius: 20px;
            color: var(--text-main);
        }
        .modal-header {
            border-bottom: 1px solid #2a2a30;
            background: #141417;
        }
        .modal-title {
            color: var(--primary-color);
            font-weight: bold;
        }
        .btn-close {
            filter: invert(1);
            opacity: 0.7;
        }
        .modal-body, .modal-footer {
            background: #141417;
        }
        .modal-footer {
            border-top: 1px solid #2a2a30;
        }
        .form-label {
            color: var(--text-main);
            font-weight: 500;
        }
        .form-control, .form-select {
            background: #0d0d10;
            border: 1px solid #2a2a30;
            color: white;
            border-radius: 8px;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(255,71,87,0.2);
            background: #0d0d10;
            color: white;
        }
        .btn-secondary {
            background: #2a2a30;
            border: none;
            color: var(--text-main);
        }
        .btn-secondary:hover {
            background: #3a3a42;
        }
        .btn-primary {
            background: var(--primary-color);
            border: none;
        }
        .btn-primary:hover {
            background: #e63e4e;
        }
    </style>
</head>
<body>

<div class="container-principal">
    <div class="topo">
        <img src="https://i.postimg.cc/FKQJ771J/favicon-cao.png" alt="Cão Chupando Mangá" class="logo-img">
        <button type="button" class="btn-add" data-bs-toggle="modal" data-bs-target="#modalCadastro">
            <i class="fas fa-plus"></i> Adicionar Mangá
        </button>
    </div>

    <div class="shelf-container">
        <div class="shelf-grid">
            <div th:each="manga : ${listaMangas}" class="manga-card">
                <div class="manga-cover">
                    <img th:if="${manga.urlCapa}" th:src="${manga.urlCapa}" alt="Capa do mangá">
                    <i th:unless="${manga.urlCapa}" class="fas fa-book-open"></i>
                </div>
                <div class="manga-info">
                    <h3 th:text="${manga.nomeManga}">Título</h3>
                    <div class="author" th:text="${'por ' + manga.autor}">Autor</div>
                    <div class="nota" th:text="${'⭐ ' + #numbers.formatDecimal(manga.nota, 1, 1) + '/10'}">Nota</div>
                    <!-- Badge com classe dinâmica conforme o status -->
                    <span th:class="'badge-status ' + ${manga.estadoManga}" th:text="${manga.estadoManga}">Status</span>
                </div>
                <div class="card-actions">
                    <a th:href="@{/mangas/editar/{id}(id=${manga.id})}" class="btn-edit"><i class="fas fa-edit"></i> Editar</a>
                    <a th:href="@{/mangas/deletar/{id}(id=${manga.id})}" class="btn-remove" onclick="return confirm('Deseja excluir este mangá?')"><i class="fas fa-trash-alt"></i> Excluir</a>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(listaMangas)}" class="empty-message">
                <i class="fas fa-box-open fa-2x"></i>
                <p>Nenhum mangá cadastrado ainda. Clique em "Adicionar Mangá" para começar sua estante!</p>
            </div>

            <div class="wood-plank" th:unless="${#lists.isEmpty(listaMangas)}"></div>
        </div>
    </div>
</div>

<!-- MODAL de cadastro -->
<div class="modal fade" id="modalCadastro" tabindex="-1" aria-labelledby="modalCadastroLabel" aria-hidden="true">
    <div class="modal-dialog text-dark">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalCadastroLabel">Novo Mangá</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form th:action="@{/mangas/novo}" th:object="${manga}" method="POST">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Nome do Mangá</label>
                        <input type="text" th:field="*{nomeManga}" class="form-control" required placeholder="Ex: Chainsaw Man">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Autor</label>
                        <input type="text" th:field="*{autor}" class="form-control" required placeholder="Ex: Tatsuki Fujimoto">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <textarea th:field="*{descricao}" class="form-control" rows="3" placeholder="Sinopse ou comentários..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">URL da Capa (imagem)</label>
                        <input type="url" th:field="*{urlCapa}" class="form-control" placeholder="https://exemplo.com/capa.jpg">
                        <small class="text-secondary">Cole o link direto da imagem (PNG, JPG, etc.)</small>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nota (0.0 a 10.0)</label>
                            <input type="number" step="0.1" min="0" max="10" th:field="*{nota}" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Status</label>
                            <select th:field="*{estadoManga}" class="form-select" required>
                                <option th:each="est : ${estados}" th:value="${est}" th:text="${est}"></option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar Mangá</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
