<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CÃO CHUPANDO MANGÁ - Editar Mangá</title>
    
    <!-- FAVICON com link online -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/FKQJ771J/favicon-cao.png">

    <style>
        /* ===== Mesmo reset e variáveis do sistema ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --bg-color: #0d0d10;
            --text-main: #ffffff;
            --text-sub: #7e7e8c;
            --primary-color: #ff4757;
            --wood-top: #8a5229;
            --wood-front: #5c341a;
        }

        body {
            background: linear-gradient(135deg, #0d0d10 0%, #1a1a20 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        /* Container do formulário - igual ao auth-card */
        .form-container {
            background: #141417;
            border-radius: 20px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            border: 1px solid #2a2a30;
            animation: fadeInUp 0.4s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo do site */
        .logo {
            display: block;
            height: 50px;
            width: auto;
            margin: 0 auto 1rem auto;
            object-fit: contain;
        }

        h2 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #2a2a30;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 0.7rem 1rem;
            background: #0d0d10;
            border: 1px solid #2a2a30;
            border-radius: 8px;
            color: white;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .form-control:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(255,71,87,0.2);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        .row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .col {
            flex: 1;
            min-width: 120px;
        }

        .btn-container {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: 0.2s;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background: #e63e4e;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #2a2a30;
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background: #3a3a42;
        }

        @media (max-width: 480px) {
            .logo { height: 40px; }
            h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <!-- LOGO DO SITE -->
    <img src="https://i.postimg.cc/FKQJ771J/favicon-cao.png" alt="Cão Chupando Mangá" class="logo">
    
    <h2>📝 Editar Mangá</h2>

    <form th:action="@{/mangas/atualizar/{id}(id=${manga.id})}" th:object="${manga}" method="POST">

        <div class="form-group">
            <label class="form-label">Nome do Mangá</label>
            <input type="text" th:field="*{nomeManga}" class="form-control" required>
        </div>

        <div class="form-group">
            <label class="form-label">Autor</label>
            <input type="text" th:field="*{autor}" class="form-control" required>
        </div>

        <div class="form-group">
            <label class="form-label">Descrição</label>
            <textarea th:field="*{descricao}" class="form-control" rows="3"></textarea>
        </div>

        <div class="form-group">
            <label class="form-label">URL da Capa (imagem)</label>
            <input type="url" th:field="*{urlCapa}" class="form-control" placeholder="https://exemplo.com/capa.jpg">
        </div>

        <div class="row">
            <div class="col">
                <label class="form-label">Nota (0 a 10)</label>
                <input type="number" step="0.1" min="0" max="10" th:field="*{nota}" class="form-control">
            </div>

            <div class="col">
                <label class="form-label">Status</label>
                <select th:field="*{estadoManga}" class="form-select" required>
                    <option th:each="est : ${estados}" th:value="${est}" th:text="${est}"></option>
                </select>
            </div>
        </div>

        <div class="btn-container">
            <a th:href="@{/mangas}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
        </div>
    </form>
</div>

</body>
</html>
